<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git & GitHub Commands</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #2a2f3a;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e8eaf0;
    --muted: #6b7280;
    --code-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 60px 40px 50px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,255,136,0.06) 0%, transparent 100%);
    overflow: hidden;
  }

  header::after {
    content: '</>';
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 120px;
    font-weight: 700;
    color: rgba(0,255,136,0.05);
    pointer-events: none;
    letter-spacing: -8px;
  }

  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-label::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
    margin-bottom: 16px;
  }

  h1 span {
    color: var(--accent);
  }

  .header-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* Search */
  .search-bar {
    position: relative;
    z-index: 10;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .search-icon {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    flex-shrink: 0;
  }

  #search {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text);
    caret-color: var(--accent);
  }

  #search::placeholder { color: var(--muted); }

  .search-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Nav tabs */
  .nav-tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main layout */
  .main {
    position: relative;
    z-index: 5;
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Section */
  .section {
    margin-bottom: 60px;
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .section-desc {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .section-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Command cards grid */
  .commands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .cmd-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .cmd-card:hover {
    border-color: var(--card-accent, var(--accent));
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .cmd-card:hover::before { opacity: 1; }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .cmd-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--code-bg);
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(0,255,136,0.15);
    flex: 1;
    word-break: break-all;
    line-height: 1.5;
  }

  .cmd-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-essential { background: rgba(0,255,136,0.15); color: var(--accent); }
  .badge-common { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .badge-advanced { background: rgba(245,158,11,0.15); color: var(--accent3); }

  .cmd-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    font-weight: 300;
  }

  .cmd-example {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(108,115,128,0.8);
    background: var(--code-bg);
    padding: 6px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    display: none;
  }

  .cmd-card:hover .cmd-example { display: block; }

  .copy-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.2s;
    z-index: 2;
  }

  .cmd-card:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  /* Footer */
  footer {
    position: relative;
    z-index: 5;
    padding: 32px 40px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  footer span { color: var(--accent); }

  /* Hidden state */
  .section.hidden { display: none; }
  .cmd-card.hidden { display: none; }

  /* Responsive */
  @media (max-width: 700px) {
    header, .search-bar, .main, footer { padding-left: 20px; padding-right: 20px; }
    .nav-tabs { padding: 0 20px; }
    .commands-grid { grid-template-columns: 1fr; }
    h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Reference Guide</div>
  <h1>Git & <span>GitHub</span><br>Commands</h1>
  <p class="header-sub">A complete reference for every git command you'll ever need — from init to deployment.</p>
</header>

<div class="search-bar">
  <span class="search-icon">$ _</span>
  <input type="text" id="search" placeholder="Search commands..." autocomplete="off" spellcheck="false">
  <span class="search-count" id="searchCount"></span>
</div>

<div class="nav-tabs" id="navTabs">
  <button class="nav-tab active" data-section="all">All</button>
  <button class="nav-tab" data-section="setup">Setup</button>
  <button class="nav-tab" data-section="basics">Basics</button>
  <button class="nav-tab" data-section="branching">Branching</button>
  <button class="nav-tab" data-section="remote">Remote</button>
  <button class="nav-tab" data-section="history">History</button>
  <button class="nav-tab" data-section="undoing">Undoing</button>
  <button class="nav-tab" data-section="stashing">Stashing</button>
  <button class="nav-tab" data-section="advanced">Advanced</button>
</div>

<main class="main" id="main"></main>

<footer>Built for developers · <span>git</span> gud · 2024</footer>

<script>
const sections = [
  {
    id: 'setup',
    icon: '⚙️',
    color: '#7c3aed',
    title: 'Setup & Configuration',
    desc: 'Configure git for the first time',
    commands: [
      { cmd: 'git config --global user.name "Your Name"', desc: 'Set your global username for all commits.', badge: 'essential', example: '# git config --global user.name "Jane Doe"' },
      { cmd: 'git config --global user.email "email@example.com"', desc: 'Set your global email address for all commits.', badge: 'essential', example: '# git config --global user.email "jane@example.com"' },
      { cmd: 'git config --list', desc: 'Display all current git configuration settings.', badge: 'common', example: '# shows all config key=value pairs' },
      { cmd: 'git config --global core.editor "code --wait"', desc: 'Set VS Code as your default git editor.', badge: 'common', example: '# or use: "vim", "nano", "atom --wait"' },
      { cmd: 'git config --global alias.st status', desc: 'Create a shortcut alias for any git command.', badge: 'advanced', example: '# now you can type: git st' },
      { cmd: 'git config --global init.defaultBranch main', desc: 'Set the default branch name for new repositories.', badge: 'common', example: '# ensures new repos use "main" instead of "master"' },
    ]
  },
  {
    id: 'basics',
    icon: '📦',
    color: '#00ff88',
    title: 'Basics',
    desc: 'Everyday git workflow commands',
    commands: [
      { cmd: 'git init', desc: 'Initialize a new git repository in the current directory.', badge: 'essential', example: '# creates a .git folder in current directory' },
      { cmd: 'git clone <url>', desc: 'Clone a remote repository to your local machine.', badge: 'essential', example: '# git clone https://github.com/user/repo.git' },
      { cmd: 'git status', desc: 'Show the state of working directory and staging area.', badge: 'essential', example: '# shows modified, staged, and untracked files' },
      { cmd: 'git add <file>', desc: 'Stage a specific file for the next commit.', badge: 'essential', example: '# git add index.html' },
      { cmd: 'git add .', desc: 'Stage all changed files in the current directory.', badge: 'essential', example: '# stages everything — use with care' },
      { cmd: 'git add -p', desc: 'Interactively stage chunks of changes (patch mode).', badge: 'advanced', example: '# hunk by hunk staging for precise commits' },
      { cmd: 'git commit -m "message"', desc: 'Commit staged changes with a descriptive message.', badge: 'essential', example: '# git commit -m "feat: add login page"' },
      { cmd: 'git commit -am "message"', desc: 'Stage all tracked changes and commit in one step.', badge: 'common', example: '# skips git add for already-tracked files' },
      { cmd: 'git commit --amend', desc: 'Modify the most recent commit (message or content).', badge: 'common', example: '# opens editor — do not use on pushed commits' },
      { cmd: 'git diff', desc: 'Show unstaged changes in working directory.', badge: 'essential', example: '# compare working dir vs staging area' },
      { cmd: 'git diff --staged', desc: 'Show staged changes that are ready to commit.', badge: 'common', example: '# compare staging area vs last commit' },
    ]
  },
  {
    id: 'branching',
    icon: '🌿',
    color: '#f59e0b',
    title: 'Branching & Merging',
    desc: 'Manage branches and integrate changes',
    commands: [
      { cmd: 'git branch', desc: 'List all local branches. The current branch is marked with *.', badge: 'essential', example: '# add -a to see remote branches too' },
      { cmd: 'git branch <name>', desc: 'Create a new branch without switching to it.', badge: 'essential', example: '# git branch feature/login' },
      { cmd: 'git checkout -b <name>', desc: 'Create and immediately switch to a new branch.', badge: 'essential', example: '# git checkout -b feature/login' },
      { cmd: 'git switch -c <name>', desc: 'Modern way to create and switch to a new branch.', badge: 'common', example: '# git switch -c feature/login' },
      { cmd: 'git checkout <branch>', desc: 'Switch to an existing branch.', badge: 'essential', example: '# git checkout main' },
      { cmd: 'git merge <branch>', desc: 'Merge a branch into the current branch.', badge: 'essential', example: '# git merge feature/login' },
      { cmd: 'git merge --no-ff <branch>', desc: 'Merge with a merge commit even if fast-forward is possible.', badge: 'common', example: '# preserves branch history clearly' },
      { cmd: 'git rebase <branch>', desc: 'Reapply commits on top of another branch tip.', badge: 'advanced', example: '# git rebase main — creates linear history' },
      { cmd: 'git rebase -i HEAD~n', desc: 'Interactively rebase the last n commits.', badge: 'advanced', example: '# git rebase -i HEAD~3 — squash, edit, reorder' },
      { cmd: 'git branch -d <name>', desc: 'Delete a branch (safely — won\'t delete unmerged work).', badge: 'common', example: '# git branch -d feature/login' },
      { cmd: 'git branch -D <name>', desc: 'Force-delete a branch regardless of merge status.', badge: 'advanced', example: '# use with caution — data may be lost' },
      { cmd: 'git cherry-pick <hash>', desc: 'Apply a specific commit from another branch onto the current branch.', badge: 'advanced', example: '# git cherry-pick a3f5c9e' },
    ]
  },
  {
    id: 'remote',
    icon: '🌐',
    color: '#38bdf8',
    title: 'Remote Repositories',
    desc: 'Work with GitHub and remote repos',
    commands: [
      { cmd: 'git remote -v', desc: 'Show all remote connections with their URLs.', badge: 'essential', example: '# lists origin and other remotes' },
      { cmd: 'git remote add origin <url>', desc: 'Add a new remote repository connection.', badge: 'essential', example: '# git remote add origin https://github.com/user/repo.git' },
      { cmd: 'git push -u origin <branch>', desc: 'Push a branch to remote and set it as the upstream.', badge: 'essential', example: '# git push -u origin main' },
      { cmd: 'git push', desc: 'Push commits to the tracked remote branch.', badge: 'essential', example: '# only works after upstream is set' },
      { cmd: 'git push origin --delete <branch>', desc: 'Delete a branch on the remote repository.', badge: 'common', example: '# git push origin --delete feature/old' },
      { cmd: 'git pull', desc: 'Fetch and merge changes from the remote branch.', badge: 'essential', example: '# equivalent to git fetch + git merge' },
      { cmd: 'git pull --rebase', desc: 'Fetch remote changes and rebase instead of merge.', badge: 'common', example: '# keeps history cleaner' },
      { cmd: 'git fetch', desc: 'Download changes from remote without merging them.', badge: 'common', example: '# safe — does not modify working directory' },
      { cmd: 'git fetch --prune', desc: 'Fetch and remove stale remote-tracking branches.', badge: 'common', example: '# cleans up deleted remote branches' },
      { cmd: 'git remote remove <name>', desc: 'Remove a remote connection.', badge: 'advanced', example: '# git remote remove origin' },
    ]
  },
  {
    id: 'history',
    icon: '🕰️',
    color: '#ec4899',
    title: 'History & Inspection',
    desc: 'Explore and search commit history',
    commands: [
      { cmd: 'git log', desc: 'Show the full commit history of the current branch.', badge: 'essential', example: '# full log with author, date, message' },
      { cmd: 'git log --oneline', desc: 'Show a compact one-line-per-commit log.', badge: 'essential', example: '# quick overview of recent commits' },
      { cmd: 'git log --oneline --graph --all', desc: 'Visualize the full branch history as an ASCII graph.', badge: 'common', example: '# great for understanding repo structure' },
      { cmd: 'git log -p', desc: 'Show commits with the full diff of each change.', badge: 'advanced', example: '# detailed history with actual code changes' },
      { cmd: 'git log --author="name"', desc: 'Filter commit log by author name.', badge: 'common', example: '# git log --author="Jane"' },
      { cmd: 'git log --since="2 weeks ago"', desc: 'Show commits from a relative time period.', badge: 'common', example: '# also: --until, --after, --before' },
      { cmd: 'git show <hash>', desc: 'Display details and diff of a specific commit.', badge: 'common', example: '# git show a3f5c9e' },
      { cmd: 'git blame <file>', desc: 'Show which commit and author last modified each line.', badge: 'common', example: '# git blame src/app.js' },
      { cmd: 'git shortlog -sn', desc: 'Summarize commit counts grouped by author.', badge: 'advanced', example: '# ranked list of top contributors' },
      { cmd: 'git bisect start', desc: 'Begin a binary search through commits to find a bug.', badge: 'advanced', example: '# then: git bisect good / git bisect bad' },
    ]
  },
  {
    id: 'undoing',
    icon: '↩️',
    color: '#f87171',
    title: 'Undoing Changes',
    desc: 'Revert, reset, and recover',
    commands: [
      { cmd: 'git restore <file>', desc: 'Discard unstaged changes in a file (modern syntax).', badge: 'essential', example: '# git restore index.html — cannot be undone!' },
      { cmd: 'git restore --staged <file>', desc: 'Unstage a file while keeping the working directory changes.', badge: 'essential', example: '# removes file from staging area only' },
      { cmd: 'git revert <hash>', desc: 'Create a new commit that undoes a previous commit safely.', badge: 'essential', example: '# safe for shared history — does not rewrite' },
      { cmd: 'git reset --soft HEAD~1', desc: 'Undo last commit but keep changes staged.', badge: 'common', example: '# commit undone, files still staged' },
      { cmd: 'git reset --mixed HEAD~1', desc: 'Undo last commit and unstage changes (default).', badge: 'common', example: '# commit and staging undone, files intact' },
      { cmd: 'git reset --hard HEAD~1', desc: 'Completely discard the last commit and all its changes.', badge: 'advanced', example: '# ⚠️ destructive — changes are gone forever' },
      { cmd: 'git clean -fd', desc: 'Remove all untracked files and directories.', badge: 'advanced', example: '# ⚠️ run git clean -n first to preview' },
      { cmd: 'git reflog', desc: 'View the history of HEAD movements — great for recovery.', badge: 'advanced', example: '# use to find lost commits after a bad reset' },
    ]
  },
  {
    id: 'stashing',
    icon: '🗄️',
    color: '#34d399',
    title: 'Stashing',
    desc: 'Temporarily save work in progress',
    commands: [
      { cmd: 'git stash', desc: 'Save current uncommitted changes to the stash stack.', badge: 'essential', example: '# clears working dir to apply quickly' },
      { cmd: 'git stash push -m "message"', desc: 'Stash changes with a descriptive label.', badge: 'common', example: '# git stash push -m "WIP: login form"' },
      { cmd: 'git stash list', desc: 'Show all stashed changesets.', badge: 'essential', example: '# stash@{0} is always the most recent' },
      { cmd: 'git stash pop', desc: 'Apply the most recent stash and remove it from the list.', badge: 'essential', example: '# applies stash@{0}' },
      { cmd: 'git stash apply stash@{n}', desc: 'Apply a specific stash without removing it.', badge: 'common', example: '# git stash apply stash@{2}' },
      { cmd: 'git stash drop stash@{n}', desc: 'Delete a specific stash entry.', badge: 'common', example: '# git stash drop stash@{0}' },
      { cmd: 'git stash clear', desc: 'Delete all stash entries permanently.', badge: 'advanced', example: '# ⚠️ irreversible — all stashes gone' },
      { cmd: 'git stash branch <name>', desc: 'Create a new branch from a stash entry.', badge: 'advanced', example: '# great for when stash causes merge conflicts' },
    ]
  },
  {
    id: 'advanced',
    icon: '🚀',
    color: '#a78bfa',
    title: 'Advanced & GitHub',
    desc: 'Power user commands and GitHub-specific workflows',
    commands: [
      { cmd: 'git tag v1.0.0', desc: 'Create a lightweight tag at the current commit.', badge: 'common', example: '# marks a specific point in history' },
      { cmd: 'git tag -a v1.0.0 -m "Release"', desc: 'Create an annotated tag with a message and metadata.', badge: 'common', example: '# recommended for release tags' },
      { cmd: 'git push origin --tags', desc: 'Push all local tags to the remote repository.', badge: 'common', example: '# tags are not pushed automatically with git push' },
      { cmd: 'git submodule add <url>', desc: 'Add a git repository as a submodule inside another repo.', badge: 'advanced', example: '# embeds another repo inside your project' },
      { cmd: 'git worktree add <path> <branch>', desc: 'Check out a branch into a separate directory simultaneously.', badge: 'advanced', example: '# work on multiple branches at once' },
      { cmd: 'git archive --format=zip HEAD > out.zip', desc: 'Export the current repository state as a zip file.', badge: 'advanced', example: '# does not include .git history' },
      { cmd: 'git grep "pattern"', desc: 'Search for a string pattern across all tracked files.', badge: 'advanced', example: '# faster than grep for git repos' },
      { cmd: 'git shortlog -sn --no-merges', desc: 'Show contribution count per author, excluding merge commits.', badge: 'advanced', example: '# useful for contributor stats' },
      { cmd: 'git rev-parse HEAD', desc: 'Output the full SHA hash of the current HEAD commit.', badge: 'advanced', example: '# use in scripts and CI/CD pipelines' },
      { cmd: 'git ls-files', desc: 'List all files tracked by git in the current repo.', badge: 'advanced', example: '# add --others to see untracked files' },
      { cmd: 'git gc', desc: 'Run garbage collection to optimize repository storage.', badge: 'advanced', example: '# cleans up loose objects and compresses history' },
      { cmd: 'gh repo create', desc: 'Create a new GitHub repository from the CLI (requires gh).', badge: 'common', example: '# install GitHub CLI: brew install gh' },
    ]
  }
];

let activeSection = 'all';
let searchQuery = '';

function getBadgeClass(badge) {
  return { essential: 'badge-essential', common: 'badge-common', advanced: 'badge-advanced' }[badge] || '';
}

function renderSections() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let totalVisible = 0;
  let delay = 0;

  sections.forEach(section => {
    const filtered = section.commands.filter(c => {
      const q = searchQuery.toLowerCase();
      return c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q);
    });

    const inSection = activeSection === 'all' || activeSection === section.id;
    if (!inSection || filtered.length === 0) return;

    totalVisible += filtered.length;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.style.animationDelay = `${delay}ms`;
    delay += 80;
    sec.dataset.id = section.id;

    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon" style="background:${section.color}22; color:${section.color}">${section.icon}</div>
        <div>
          <div class="section-title">${section.title}</div>
          <div class="section-desc">${section.desc}</div>
        </div>
        <span class="section-count">${filtered.length} cmd${filtered.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="commands-grid"></div>
    `;

    const grid = sec.querySelector('.commands-grid');

    filtered.forEach(c => {
      const card = document.createElement('div');
      card.className = 'cmd-card';
      card.style.setProperty('--card-accent', section.color);

      card.innerHTML = `
        <button class="copy-btn" title="Copy command">copy</button>
        <div class="cmd-top">
          <code class="cmd-code">${escapeHtml(c.cmd)}</code>
          <span class="cmd-badge ${getBadgeClass(c.badge)}">${c.badge}</span>
        </div>
        <div class="cmd-desc">${c.desc}</div>
        ${c.example ? `<div class="cmd-example">${escapeHtml(c.example)}</div>` : ''}
      `;

      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(c.cmd).then(() => {
          copyBtn.textContent = '✓ copied';
          copyBtn.classList.add('copied');
          setTimeout(() => {
            copyBtn.textContent = 'copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        });
      });

      grid.appendChild(card);
    });

    main.appendChild(sec);
  });

  const countEl = document.getElementById('searchCount');
  if (searchQuery) {
    countEl.textContent = `${totalVisible} result${totalVisible !== 1 ? 's' : ''}`;
  } else {
    countEl.textContent = '';
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Nav tabs
document.getElementById('navTabs').addEventListener('click', e => {
  const tab = e.target.closest('.nav-tab');
  if (!tab) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeSection = tab.dataset.section;
  renderSections();
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  // Reset to all sections when searching
  if (searchQuery) {
    activeSection = 'all';
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-section="all"]').classList.add('active');
  }
  renderSections();
});

renderSections();
</script>
</body>
</html>
